<!DOCTYPE html>
<html>

<head>

<title>Issue Tracking</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
}

</style>

</head>

<body class="p-10 text-white">

<div class="flex justify-between mb-8">

<h1 class="text-3xl font-bold">
Issue Tracking
</h1>

<button onclick="goBack()" class="bg-gray-500 px-4 py-2 rounded">
Back
</button>

</div>

<div id="tracking" class="grid grid-cols-3 gap-8"></div>


<script>

const userId = localStorage.getItem("userId")

function goBack(){
window.location="citizen.html"
}

async function loadTracking(){

const res = await fetch("/campaigns")

const data = await res.json()

let html=""

data.forEach(c=>{

const joined=c.volunteers.length
const percent=(joined/c.volunteersRequired)*100

html+=`

<div class="bg-white text-black p-5 rounded-xl shadow">

<h2 class="font-bold text-xl mb-2">
${c.title}
</h2>

<p>Date: ${c.date}</p>

<p>Status: ${c.status}</p>

<p class="mt-2">
Volunteers: ${joined}/${c.volunteersRequired}
</p>

<div class="w-full bg-gray-200 h-3 rounded mt-2">

<div class="bg-green-500 h-3 rounded"
style="width:${percent}%"></div>

</div>

</div>

`

})

document.getElementById("tracking").innerHTML=html

}

loadTracking()

</script>

</body>
</html>
