<!DOCTYPE html>
<html>

<head>

<title>Issue Details</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
min-height:100vh;
}

</style>

</head>

<body class="p-10 text-white">

<!-- Back Button -->

<button onclick="goBack()" 
class="bg-gray-500 px-4 py-2 rounded mb-6">
Back
</button>

<!-- Issue Details -->

<div id="issueDetails" class="bg-white text-black p-6 rounded-xl shadow mb-10"></div>

<!-- Create Campaign -->

<h2 class="text-2xl font-bold mb-4">
Create Campaign
</h2>

<div class="bg-white text-black p-6 rounded-xl shadow w-1/2">

<input
id="title"
placeholder="Campaign Title"
class="border p-2 w-full mb-3"
>

<!-- CATEGORY SELECT -->

<select id="category" class="border p-2 w-full mb-3">

<option value="cleanliness">Cleanliness</option>

<option value="environment">Environment</option>

<option value="education">Education</option>

<option value="health">Health</option>

</select>

<input
id="date"
type="date"
class="border p-2 w-full mb-3"
>

<input
id="time"
type="time"
class="border p-2 w-full mb-3"
>

<input
id="volunteers"
placeholder="Volunteers Required"
class="border p-2 w-full mb-3"
>

<button
onclick="createCampaign()"
class="bg-green-600 text-white px-6 py-2 rounded w-full">

Create Campaign

</button>

</div>


<script>

const issueId = localStorage.getItem("issueId")

async function loadIssue(){

const res = await fetch("/issues")

const data = await res.json()

const issue = data.find(i => i._id === issueId)

document.getElementById("issueDetails").innerHTML = `

<img src="/uploads/${issue.image}"
class="w-full h-96 object-cover rounded mb-5">

<h2 class="text-3xl font-bold mb-2">
${issue.description}
</h2>

<a href="${issue.location}"
target="_blank"
class="text-blue-600 underline">

Open Location

</a>

`

}


async function createCampaign(){

const title = document.getElementById("title").value
const category = document.getElementById("category").value
const date = document.getElementById("date").value
const time = document.getElementById("time").value
const volunteersRequired = document.getElementById("volunteers").value

await fetch("/create-campaign",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

issueId,
title,
category,
date,
time,
volunteersRequired

})

})

alert("Campaign Created Successfully")

window.location="active-campaigns.html"

}


function goBack(){

window.location="reported-issues.html"

}


loadIssue()

</script>

</body>

</html>
