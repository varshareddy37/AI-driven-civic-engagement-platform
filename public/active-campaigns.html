<!DOCTYPE html>
<html>

<head>

<title>Active Campaigns</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
min-height:100vh;
}

.card{
transition:0.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.04);
}

</style>

</head>

<body class="p-10 text-white">

<h1 class="text-4xl font-bold mb-8">
Active Campaigns
</h1>

<div id="campaigns" class="grid grid-cols-3 gap-8"></div>


<script>


async function loadCampaigns(){

const res = await fetch("/campaigns")

const data = await res.json()

let html=""

data.forEach(c=>{
if(c.status === "Completed") return

const joined = c.volunteers.length
const percent = (joined/c.volunteersRequired)*100

html += `

<div class="card bg-white text-black p-5 rounded-xl shadow">

<h2 class="font-bold text-xl mb-2">
${c.title}
</h2>

<p>Date: ${c.date}</p>

<p>Time: ${c.time}</p>

<p>Status:
<span class="font-bold text-blue-600">
${c.status}
</span>
</p>

<p class="mt-2">
${joined}/${c.volunteersRequired} Volunteers
</p>

<div class="w-full bg-gray-200 h-3 rounded mt-2">

<div class="bg-green-500 h-3 rounded"
style="width:${percent}%">
</div>

</div>


<select id="status${c._id}"
class="border p-2 mt-3 w-full">

<option>Campaign Created</option>
<option>In Progress</option>
<option>Completed</option>
<option>Cancelled</option>

</select>


<button onclick="updateStatus('${c._id}')"
class="bg-blue-600 text-white px-4 py-2 mt-3 rounded w-full">

Update Status

</button>


<button onclick="deleteCampaign('${c._id}')"
class="bg-red-500 text-white px-4 py-2 mt-3 rounded w-full">

Delete Campaign

</button>

</div>

`

})

document.getElementById("campaigns").innerHTML = html

}



async function updateStatus(id){

const status = document.getElementById("status"+id).value

await fetch("/update-campaign-status",{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
campaignId:id,
status:status
})

})

alert("Status Updated")

loadCampaigns()

}



async function deleteCampaign(id){

await fetch("/delete-campaign/"+id,{
method:"DELETE"
})

alert("Campaign Deleted")

loadCampaigns()

}



loadCampaigns()

</script>

</body>
</html>
