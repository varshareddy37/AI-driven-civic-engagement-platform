<!DOCTYPE html>
<html>

<head>

<title>My Issues</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
}

.card{
transition:0.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.04);
}

</style>

</head>

<body class="p-10 text-white">

<div class="flex justify-between mb-8">

<h1 class="text-3xl font-bold">
My Reported Issues
</h1>

<button onclick="goBack()" class="bg-gray-500 px-4 py-2 rounded">
Back
</button>

</div>

<div id="issues" class="grid grid-cols-3 gap-8"></div>


<script>

const userId = localStorage.getItem("userId")

function goBack(){
window.location="citizen.html"
}

async function loadIssues(){

const res = await fetch("/my-issues/"+userId)

const data = await res.json()

let html=""

data.forEach(issue=>{

html+=`

<div class="card bg-white text-black p-4 rounded-xl shadow">

<p class="font-bold text-lg">
${issue.description}
</p>

<a href="${issue.location}"
target="_blank"
class="text-blue-600 underline">
View Location
</a>

<p class="mt-2">
Status: ${issue.status}
</p>

</div>

`

})

document.getElementById("issues").innerHTML=html

}

loadIssues()

</script>

</body>
</html>
