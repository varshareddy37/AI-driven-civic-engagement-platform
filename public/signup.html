<!DOCTYPE html>
<html>

<head>

<title>Signup</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
}

.quote{
font-family:'Playfair Display',serif;
font-style:italic;
}

</style>

</head>

<body class="flex flex-col items-center justify-center text-white">

<h1 class="text-6xl font-bold mb-3">
Connect For Cause
</h1>

<p class="quote text-lg text-gray-200 mb-12">
"Alone we can do so little, together we can do so much"
</p>

<div class="bg-white text-black p-8 rounded-xl shadow w-80">

<h2 class="text-2xl font-bold mb-6 text-center">
Create Account
</h2>

<input id="name" placeholder="Name" class="border p-2 w-full mb-3">

<input id="email" placeholder="Email" class="border p-2 w-full mb-3">

<input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-3">

<select id="role" class="border p-2 w-full mb-3">

<option value="citizen">Citizen</option>
<option value="ngo">NGO</option>
<option value="volunteer">Volunteer</option>

</select>


<div id="interestSection" class="hidden mb-3">

<p class="font-bold mb-2">Select Interests</p>

<label><input type="checkbox" value="cleanliness"> Cleanliness</label><br>

<label><input type="checkbox" value="environment"> Environment</label><br>

<label><input type="checkbox" value="education"> Education</label><br>

<label><input type="checkbox" value="health"> Health</label>

</div>

<button onclick="signup()" class="bg-green-600 text-white w-full p-2 rounded">
Signup
</button>

</div>


<script>

document.getElementById("role").addEventListener("change",function(){

if(this.value==="volunteer"){
document.getElementById("interestSection").style.display="block"
}else{
document.getElementById("interestSection").style.display="none"
}

})


async function signup(){

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const password=document.getElementById("password").value
const role=document.getElementById("role").value

const interests=[]

document.querySelectorAll("#interestSection input:checked").forEach(cb=>{
interests.push(cb.value)
})

await fetch("/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
password,
role,
interests
})

})

alert("Account created")

window.location="login.html"

}

</script>

</body>
</html>
