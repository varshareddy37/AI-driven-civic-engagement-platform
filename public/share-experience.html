<!DOCTYPE html>
<html>

<head>

<title>Share Experience</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
}

</style>

</head>

<body class="p-10 text-white">

<div class="flex justify-between mb-8">

<h1 class="text-3xl font-bold">
Share Your Experience
</h1>

<button onclick="goBack()" class="bg-gray-500 px-4 py-2 rounded">
Back
</button>

</div>

<div class="bg-white text-black p-6 rounded-xl shadow w-1/2">

<textarea
id="experience"
placeholder="Share your campaign experience..."
class="border p-2 w-full mb-3 h-40">
</textarea>

<button onclick="submitExperience()"
class="bg-blue-600 text-white px-4 py-2 rounded w-full">

Submit Experience

</button>

</div>

<script>

const volunteerId = localStorage.getItem("userId")

function goBack(){
window.location="volunteer.html"
}

async function submitExperience(){

const text = document.getElementById("experience").value

await fetch("/add-experience",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
volunteerId,
text
})

})

alert("Experience Submitted")

}

</script>

</body>
</html>
