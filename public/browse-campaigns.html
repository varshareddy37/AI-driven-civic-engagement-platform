<!DOCTYPE html>
<html>

<head>

<title>Browse Campaigns</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
min-height:100vh;
}

.card{
transition:0.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.04);
}

</style>

</head>

<body class="p-10 text-white">

<div class="flex justify-between mb-8">

<h1 class="text-3xl font-bold">
Recommended Campaigns
</h1>

<button onclick="goBack()" class="bg-gray-500 px-4 py-2 rounded">
Back
</button>

</div>


<div id="campaigns" class="grid grid-cols-3 gap-8"></div>


<script>

const volunteerId = localStorage.getItem("userId")


function goBack(){
window.location="volunteer.html"
}


async function loadCampaigns(){

const res = await fetch("/recommended-campaigns/"+volunteerId)

const data = await res.json()

let html=""

data.forEach(c=>{

const joined = c.volunteers.length
const percent = (joined/c.volunteersRequired)*100

html += `

<div class="card bg-white text-black p-5 rounded-xl shadow">

<h2 class="font-bold text-xl mb-2">
${c.title}
</h2>

<p class="mb-1">
Category: <span class="font-bold">${c.category}</span>
</p>

<p>Date: ${c.date}</p>

<p>Time: ${c.time}</p>

<p class="mt-2">
Volunteers Joined: ${joined}/${c.volunteersRequired}
</p>

<div class="w-full bg-gray-200 h-3 rounded mt-2">

<div class="bg-green-500 h-3 rounded"
style="width:${percent}%">
</div>

</div>

<button onclick="joinCampaign('${c._id}')"
class="bg-green-600 text-white px-4 py-2 mt-3 rounded w-full">

Join Campaign

</button>

</div>

`

})

document.getElementById("campaigns").innerHTML = html

}



async function joinCampaign(id){

await fetch("/join-campaign",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
campaignId:id,
volunteerId
})

})

alert("Joined Campaign")

loadCampaigns()

}


loadCampaigns()

</script>

</body>
</html>
