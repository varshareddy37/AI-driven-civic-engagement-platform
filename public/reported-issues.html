<!DOCTYPE html>
<html>

<head>

<title>Reported Issues</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
min-height:100vh;
}

.card{
transition:0.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.04);
}

</style>

</head>

<body class="p-10 text-white">

<!-- Header -->

<div class="flex justify-between mb-10">

<h1 class="text-4xl font-bold">
Reported Issues
</h1>

<button onclick="goBack()" 
class="bg-gray-500 px-5 py-2 rounded hover:bg-gray-600">
Back
</button>

</div>

<!-- Issues Grid -->

<div id="issues" class="grid grid-cols-3 gap-8"></div>


<script>

/* Go back to NGO dashboard */

function goBack(){
window.location.href="ngo.html"
}


/* Load issues */

async function loadIssues(){

const res = await fetch("/issues")

const data = await res.json()

let html=""

data.forEach(issue=>{

html += `

<div onclick="openIssue('${issue._id}')"

class="card bg-white text-black p-4 rounded-xl shadow cursor-pointer">

<img src="/uploads/${issue.image}" 
class="h-48 w-full object-cover rounded mb-3">

<p class="font-bold text-lg">
${issue.description}
</p>

<p class="text-gray-500 text-sm mt-1">
Click to view full details
</p>

</div>

`

})

document.getElementById("issues").innerHTML = html

}


/* Open issue details page */

function openIssue(id){

console.log("Opening issue:", id)

localStorage.setItem("issueId", id)

window.location.href = "issue-details.html"

}


/* Run page */

loadIssues()

</script>

</body>
</html>
