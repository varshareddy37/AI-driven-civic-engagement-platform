<!DOCTYPE html>
<html>

<head>

<title>Campaign History</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
min-height:100vh;
}

.card{
transition:0.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.04);
}

</style>

</head>

<body class="p-10 text-white">

<h1 class="text-4xl font-bold mb-8">
Campaign History
</h1>

<div id="history" class="grid grid-cols-3 gap-8"></div>

<script>

async function loadHistory(){

const res = await fetch("/campaigns")

const data = await res.json()

let html=""

data.forEach(c=>{

if(c.status !== "Completed") return

html+=`

<div class="card bg-white text-black p-5 rounded-xl shadow">

<h2 class="font-bold text-xl mb-2">
${c.title}
</h2>

<p>Date: ${c.date}</p>

<p>Time: ${c.time}</p>

<p class="text-green-600 font-bold mt-2">
Campaign Completed
</p>

<p>
Volunteers Participated: ${c.volunteers.length}
</p>

</div>

`

})

document.getElementById("history").innerHTML = html

}

loadHistory()

</script>

</body>
</html>
